name: Build Galaxy Tunnel APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Fetches submodules if V2ray library is linked as a submodule

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      continue-on-error: true # Safe fallback in case gradlew is not checked in yet

    # Note: If your project depends on precompiled v2ray/xray .aar or .so binaries, 
    # you can uncomment this step to download them automatically from a public release to prevent huge repo sizes.
    # - name: Download V2ray Core AAR
    #   run: |
    #     mkdir -p app/libs
    #     curl -L -o app/libs/libv2ray.aar https://github.com/2dust/v2rayNG/releases/download/1.9.1/libv2ray.aar

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Galaxy-Tunnel-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
